name: Build and Push Docker Image
# This workflow builds a Docker image from the repository and pushes it to Docker Hub whenever there is a push to the main branch.
on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository, log in to Docker Hub, build the image, and push it to Docker Hub
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-python-api:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/simple-python-api:latest